repos:
 - repo: https://github.com/astral-sh/ruff-pre-commit
   rev: v0.11.2
   hooks:
   - id: ruff
     args: [
       '--fix',
       '--target-version', 'py311',
       '--select', 'E,F,UP,W',
       '--ignore', 'E203,E402,E501',
     ]
   - id: ruff-format
     args: ['--target-version', 'py311']
