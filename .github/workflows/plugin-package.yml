name: 🔌 Plugin | Package and release

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - '*'
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - swiss_locator/**
  workflow_dispatch:


jobs:
  plugin-package:
    name: Packages and releases plugin
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Qt lrelease
        run: |
          sudo apt-get update
          sudo apt-get install qtbase5-dev qttools5-dev-tools

      - name: Install qgis-plugin-ci
        run: pip install qgis-plugin-ci>=2.8.6

      - name: 🌍 Push translations
        if: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}
        run: qgis-plugin-ci push-translation ${{ secrets.TX_TOKEN }}

      - name: Package
        if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
        run: |
          VERSION=0.0.0
          qgis-plugin-ci -v package ${VERSION} \
            --allow-uncommitted-changes \
            --transifex-token "${{ secrets.TX_TOKEN }}"

      - name: Upload artifact
        id: upload-artifact
        uses: actions/upload-artifact@v7
        if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
        with:
          archive: false
          path: swiss_locator.0.0.0.zip
          if-no-files-found: error

      - name: Comment on PR with artifact link
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: plugin-artifact
          message: |
            ## 🔌 Plugin Artifact

            A development build of the plugin is available for testing:

            **[⬇️ Download swiss_locator_dev.zip](${{ steps.upload-artifact.outputs.artifact-url }})**

            > ⚠️ This is a development build from commit ${{ github.event.pull_request.head.sha }}.

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${{ github.ref_name }}
          qgis-plugin-ci release ${VERSION} \
            --allow-uncommitted-changes \
            --github-token ${{ secrets.GITHUB_TOKEN }} \
            --qgis-token ${{ secrets.QGIS_ORG_TOKEN }} \
            --transifex-token "${{ secrets.TX_TOKEN }}"
