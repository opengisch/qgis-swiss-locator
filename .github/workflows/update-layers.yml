
name: Update Layers

on:
  schedule:
    # weekly
    - cron:  '0 0 * * 0'
  push:
    branches:
      - master
    paths:
      - .github/workflows/update-layers.yml
  workflow_dispatch:

jobs:
  update-layers:
    runs-on: ubuntu-latest

    steps:
      - name: Get source code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Update layers
        run: |
          cd swiss_locator/map_geo_admin
          ./download_layer_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add swiss_locator/map_geo_admin/layers_*.json
          git diff --cached --quiet || (git commit -m "update map.geo.admin.ch layers" && git push)